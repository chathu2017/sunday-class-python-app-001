name: Build on GitHub Runner

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies (Building on GitHub)
      #  dependencies tike current folder ekema wenma thenakta install karanwa
      run: pip install --target=".python_packages/lib/site-packages" -r requirements.txt

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'sunday-class-test-2026'
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_1 }}
        package: .
