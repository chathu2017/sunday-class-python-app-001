name: Build on Azure (Oryx Engine)
on:
  push:
    branches:
      - main
jobs:
  deploy-raw-code:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # methana api Python setup karana, pip install karana kisima code part ekak nehe....!!!!
    # kelinma Raw Code eka Azure oryx engine ekta yawanwa
    - name: Deploy to Azure Web App (Raw Code)
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'appservice-oryxbuild' 
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_2 }}
        package: .
